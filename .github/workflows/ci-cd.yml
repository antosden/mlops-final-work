name: CI/CD to Google Cloud Run

on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
  IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}

jobs:
  ci:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall api ml_pipeline

      - name: Check ML imports
        run: |
          python -c "import pandas, sklearn, mlflow, lightgbm, catboost; print('Imports OK')"

      - name: Run tests if present
        run: |
          if [ -d "tests" ]; then
            pytest tests
          else
            echo "No tests directory found. Skipping tests."
          fi

      - name: Docker build check
        run: |
          docker build -f api/Dockerfile -t flocktory-mlops-api:test .

  deploy-vm:
    name: Deploy full stack to GCE VM
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH to Google Compute Engine VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ${{ secrets.GCE_PROJECT_PATH }}

            git fetch origin
            git reset --hard origin/master

            docker compose down
            docker compose up -d --build --force-recreate

            sleep 20

            docker ps

            echo "=== API logs ==="
            docker compose logs api --tail=80

            echo "=== MLflow logs ==="
            docker compose logs mlflow --tail=80

            echo "=== Check API ==="
            curl -v --retry 5 --retry-delay 5 --retry-all-errors http://localhost:8000/health

            echo "=== Check MLflow ==="
            curl -v --retry 5 --retry-delay 5 --retry-all-errors http://localhost:5000/ || true