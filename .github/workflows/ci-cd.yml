name: CI/CD to Google Cloud Run

on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
  ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
  IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}

jobs:
  ci:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall api ml_pipeline

      - name: Check ML imports
        run: |
          python -c "import pandas, sklearn, mlflow, lightgbm, catboost; print('Imports OK')"

      - name: Run tests if present
        run: |
          if [ -d "tests" ]; then
            pytest tests
          else
            echo "No tests directory found. Skipping tests."
          fi

      - name: Docker build check
        run: |
          docker build -f api/Dockerfile -t flocktory-mlops-api:test .

  deploy:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f api/Dockerfile \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/$IMAGE_NAME:${{ github.sha }} \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/$IMAGE_NAME:latest \
            .

      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/$IMAGE_NAME:${{ github.sha }}
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPO/$IMAGE_NAME:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080

      - name: Check deployed health endpoint
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"
          curl -f "$SERVICE_URL/health"